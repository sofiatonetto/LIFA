<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/css/css.css" rel="stylesheet" />
</head>
<body>
<div class="page" id="page-inscricao">
    <div class="page-header">
      <div class="header-left">
        <div class="header-badge">Cadastro</div>
      </div>
    </div>

    <div class="content-card" style="max-width:720px">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Dados do Bolsista
      </div>

      <div class="grid-2" style="display: grid; grid-template-columns: 2.5fr 2fr 2fr; gap: 15px; align-content: center;">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input class="form-input" type="text"/>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input class="form-input" type="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Matrícula</label>
          <input class="form-input" type="text"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" placeholder="Selecione a opção">Linha de Pesquisa *</label>
        <select class="form-select">
          <option value="" disabled selected >Selecione uma opção</option>
          <option>Otimização de pás de turbinas eólicas</option>
          <option>Geotecnologias</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Upload de Documentos</label>
        <div class="upload-zone" id="dropZone"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleDrop(event)"
          onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p><strong>Clique para enviar</strong> ou arraste aqui</p>
          <p style="font-size:12px;margin-top:4px">PDF, DOC, DOCX · Máx. 10MB</p>
          <input type="file" id="fileInput" style="display:none" accept=".pdf,.doc,.docx" multiple onchange="showFiles(this)" />
        </div>
        <div id="fileList" style="margin-top:8px;display:flex;flex-direction:column;gap:6px"></div>
      </div>

      <div class="divider"></div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="resetForm()">Limpar</button>
        <button class="btn btn-primary" onclick="submitForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Cadastrar Bolsista
        </button>
      </div>
    </div>
  </div>
